<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Email AI Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="background-glow secondary"></div>

    <main class="container">
        <header class="header">
            <h1>AI Cold Email <span>Agent</span></h1>
            <p>Generate high-converting sequences and evaluate them with AI.</p>
        </header>

        <section class="input-card glass">
            <div class="input-group">
                <label for="industry">Target Industry</label>
                <input type="text" id="industry" placeholder="e.g. SaaS, Real Estate, E-commerce..." autocomplete="off">
            </div>
            <div class="input-group">
                <label for="product">Your Product / Service</label>
                <input type="text" id="product" placeholder="e.g. AI Workflow Automation Tool..." autocomplete="off">
            </div>
            <button id="generateBtn" class="btn-primary">
                <span class="btn-text">Generate Sequence</span>
                <span class="loader hidden"></span>
            </button>
        </section>

        <!-- Results Section, initially hidden -->
        <section id="resultsSection" class="results-grid hidden">
            <!-- Left Column: Context -->
            <div class="results-col">
                <div class="result-card glass">
                    <div class="card-header">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <h2>Target Persona</h2>
                    </div>
                    <div id="personaContent" class="card-content markdown-body"></div>
                </div>

                <div class="result-card glass">
                    <div class="card-header">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        <h2>Analyzed Pain Points</h2>
                    </div>
                    <div id="painContent" class="card-content markdown-body"></div>
                </div>
                
                <div class="result-card glass judge-card">
                    <div class="card-header">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg>
                        <h2>Judge Evaluation</h2>
                        <span id="judgeScoreBadge" class="score-badge">--/10</span>
                    </div>
                    <div id="judgeContent" class="card-content"></div>
                </div>
            </div>

            <!-- Right Column: Emails -->
            <div class="results-col">
                <div class="result-card glass email-card">
                    <div class="card-header">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        <h2>Email 1: Initial Hook</h2>
                        <button class="copy-btn" data-target="email1Body">Copy</button>
                    </div>
                    <div class="card-content">
                        <div class="email-field">
                            <label>Subject:</label>
                            <div id="email1Subject" class="email-value subject"></div>
                        </div>
                        <div class="email-field">
                            <label>Body:</label>
                            <div id="email1Body" class="email-value body"></div>
                        </div>
                        <div class="email-field">
                            <label>Call to Action:</label>
                            <div id="email1Cta" class="email-value cta"></div>
                        </div>
                    </div>
                </div>

                <div class="result-card glass email-card">
                    <div class="card-header">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        <h2>Email 2: Follow Up</h2>
                        <button class="copy-btn" data-target="email2Body">Copy</button>
                    </div>
                    <div class="card-content">
                        <div class="email-field">
                            <label>Subject:</label>
                            <div id="email2Subject" class="email-value subject"></div>
                        </div>
                        <div class="email-field">
                            <label>Body:</label>
                            <div id="email2Body" class="email-value body"></div>
                        </div>
                        <div class="email-field">
                            <label>Call to Action:</label>
                            <div id="email2Cta" class="email-value cta"></div>
                        </div>
                    </div>
                </div>

                <div class="result-card glass email-card">
                    <div class="card-header">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        <h2>Email 3: Final Follow-up</h2>
                        <button class="copy-btn" data-target="email3Body">Copy</button>
                    </div>
                    <div class="card-content">
                        <div class="email-field">
                            <label>Subject:</label>
                            <div id="email3Subject" class="email-value subject"></div>
                        </div>
                        <div class="email-field">
                            <label>Body:</label>
                            <div id="email3Body" class="email-value body"></div>
                        </div>
                        <div class="email-field">
                            <label>Call to Action:</label>
                            <div id="email3Cta" class="email-value cta"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
